</script>








<script>
    document.querySelector('.form-select').addEventListener('input', function () {
        if (this.value == '셔츠') {
            document.getElementById('form-hide').style.display = 'block';
        }else if(this.value == '모자'){
          document.getElementById('form-hide').style.display = 'none';
        }else if(this.value == '바지'){
          document.getElementById('form-hide').style.display = 'block';
          
        }
    })
</script>

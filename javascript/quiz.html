<body>
<script>
    var 출석부 = ['흥민', '영희', '철수', '재석'];

        function 이름찾기(name){
        for( let i = 0; i< 출석부.length; i++){
            if(name == 출석부[i]){
                console.log([i]+" 있어요");
            }else{
                console.log('없어요');
        }
        }
}
이름찾기('흥민');
</script>








    <p>태조 이성계가 태어난 년도는?</p>
    <input type="text" id="answer">
    <button id="send-answer">제출</button>

    <script>
        let count = 0;

        document.getElementById("send-answer").addEventListener('click', function () {
            count += 1;

            let 정답 = document.getElementById('answer').value;
            if (정답 == 1335) {
                alert('정답')
            } else if (count >= 3 && 정답 != 1335) {
                alert('멍청아')
            }
        })
    </script>
